{{- if .Values.dexServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "litmus-portal.fullname" . }}-litmusportal-dex-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "litmus-portal.name" . }}-litmusportal-dex-server
    {{- if .Values.dexServer.customLabels }}
      {{ toYaml .Values.dexServer.customLabels | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.dexServer.autoscaling.enabled }}
  replicas: {{ .Values.dexServer.replicas }}
  {{- end }}
  {{- if .Values.dexServer.updateStrategy }}
  strategy:
  {{ toYaml .Values.dexServer.updateStrategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ include "litmus-portal.name" . }}-litmusportal-dex-server
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ include "litmus-portal.name" . }}-litmusportal-dex-server
    spec:
      serviceAccountName: {{ include "litmus-portal.fullname" . }}-dex-server-account
      containers:
        - name: litmus-dex
          imagePullPolicy: {{ .Values.dexServer.image.pullPolicy }}
          image: {{ .Values.image.imageRegistryName }}/{{ .Values.dexServer.image.repository }}:{{ .Values.dexServer.image.tag }}
          command: ["/usr/local/bin/dex", "serve", "/etc/dex/cfg/config.yaml"]
          ports:
            - containerPort: {{ .Values.dexServer.containerPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/dex/cfg
          {{- if .Values.dexServer.resources }}
          resources:
            {{- toYaml .Values.dexServer.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.dexServer.securityContext }}
          securityContext:
            {{- toYaml .Values.dexServer.securityContext | nindent 12 }}
          {{- end }}
          {{- if or .Values.proxy.httpProxy .Values.proxy.httpsProxy .Values.proxy.noProxy }}
          env:
            {{- if .Values.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ .Values.proxy.httpProxy | quote }}
            {{- end }}
            {{- if .Values.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ .Values.proxy.httpsProxy | quote }}
            {{- end }}
            {{- if .Values.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ .Values.proxy.noProxy | quote }}
            {{- end }}
          {{- end }}
      volumes:
        - name: config
          configMap: 
            name: {{ include "litmus-portal.fullname" . }}-dex-server-admin-config
            items:
              - key: config.yaml
                path: config.yaml
    {{- with .Values.dexServer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.dexServer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.dexServer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}