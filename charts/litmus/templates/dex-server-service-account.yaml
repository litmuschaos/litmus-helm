{{- if and .Values.dexServer.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "litmus-portal.fullname" . }}-dex-server-account
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "litmus-portal.fullname" . }}-dex-server
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
rules:
  - apiGroups: [dex.coreos.com]
    resources:
      [
        authcodes,
        authrequests,
        connectors,
        devicerequests,
        connectors,
        devicerequests,
        devicetokens,
        oauth2clients,
        offlinesessionses,
        passwords,
        refreshtokens,
        signingkeies,
      ]
    verbs: [delete, deletecollection, get, list, patch, create, update, watch]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, get, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "litmus-portal.fullname" . }}-dex-server-crb
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "litmus-portal.fullname" . }}-dex-server
subjects:
  - kind: ServiceAccount
    name: {{ include "litmus-portal.fullname" . }}-dex-server-account
    namespace: {{ .Release.Namespace }}

{{- end }}